name: Publish to Modrinth

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read versions
        id: props
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2- | tr -d '\r' | xargs)
          MINECRAFT_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2- | tr -d '\r' | xargs)

          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$MINECRAFT_VERSION" >> "$GITHUB_OUTPUT"

          echo "Mod version: $MOD_VERSION"
          echo "Minecraft version: $MINECRAFT_VERSION"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Find built jar
        id: jar
        run: |
          JAR=$(find build/libs -maxdepth 1 -type f \
            -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-dev.jar" \
            | sort \
            | head -n 1)

          if [ -z "$JAR" ]; then
            echo "No publishable jar found in build/libs"
            exit 1
          fi

          echo "file=$JAR" >> "$GITHUB_OUTPUT"
          echo "Publishing jar: $JAR"

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_KEY }}
          project: vRLMGNBB
          version: ${{ steps.props.outputs.mod_version }}
          loaders: fabric
          game-versions: ${{ steps.props.outputs.minecraft_version }}
          files: ${{ steps.jar.outputs.file }}
